name: SnapMyWindows
options:
  bundleIdPrefix: com.snapmywindows
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "13.0"

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 1.9.0

targets:
  SnapMyWindows:
    type: application
    platform: macOS
    sources:
      - path: SnapMyWindows
    dependencies:
      - package: KeyboardShortcuts
    settings:
      CODE_SIGN_IDENTITY: "-"
      ENABLE_APP_SANDBOX: NO
    info:
      path: SnapMyWindows/Info.plist
      properties:
        LSUIElement: true
        CFBundleVersion: 1
        CFBundleShortVersionString: "1.0.0"

  SnapMyWindowsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SnapMyWindowsTests
    dependencies:
      - target: SnapMyWindows
    settings:
      GENERATE_INFOPLIST_FILE: YES
